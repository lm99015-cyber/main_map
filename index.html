<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원소 탐험 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans KR',sans-serif;}
.wrap{position:relative;width:100%;height:100%;}
img{display:block;width:100%;height:100%;object-fit:contain;}

/* zone: JS로 position 설정 */
.zone-area{
  position:absolute;
  cursor:pointer;
  text-decoration:none;
  border-radius:16px;
  /* 디버그용 border (확인 후 제거 가능) */
  /* border:2px dashed red; */
}
.zone-area:hover .zone-glow{opacity:1;}
.zone-glow{
  position:absolute;inset:0;border-radius:16px;
  opacity:0;transition:opacity 0.2s;pointer-events:none;
}
.zone-1 .zone-glow{background:radial-gradient(ellipse at center,rgba(60,200,120,0.75) 0%,transparent 60%);}
.zone-2 .zone-glow{background:radial-gradient(ellipse at center,rgba(255,100,60,0.75) 0%,transparent 60%);}
.zone-3 .zone-glow{background:radial-gradient(ellipse at center,rgba(60,150,255,0.75) 0%,transparent 60%);}
.zone-4 .zone-glow{background:radial-gradient(ellipse at center,rgba(245,200,66,0.75) 0%,transparent 60%);}

/* 커서 따라다니는 라벨 */
.zone-label{
  position:fixed;
  white-space:nowrap;
  background:rgba(5,10,5,0.96);
  border:2.5px solid #f5c842;
  border-radius:14px;
  padding:12px 22px;
  font-size:15px;font-weight:800;
  color:#fff;
  opacity:0;
  transition:opacity 0.25s;
  pointer-events:none;
  backdrop-filter:blur(12px);
  box-shadow:0 6px 32px rgba(0,0,0,0.7),0 0 20px rgba(245,200,66,0.4);
  z-index:9999;
}
.zone-area:hover .zone-label{opacity:1;}
.lbl-icon{font-size:24px;margin-right:8px;vertical-align:middle;}
.lbl-name{display:block;font-size:18px;font-weight:900;color:#f5c842;margin-bottom:4px;}
.lbl-desc{display:block;font-size:13px;color:rgba(245,234,208,0.85);font-weight:700;}

.particle{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;animation:burst 0.8s ease-out forwards;}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <img src="https://lm99015-cyber.github.io/main_map/main_image.png" id="mapImg" alt="원소 탐험 지도" draggable="false">

  <a class="zone-area zone-1" id="zone1" href="https://lm99015-cyber.github.io/periodic_table1/" onclick="spawnConfetti(event)">
    <div class="zone-glow"></div>
    <div class="zone-label"><span class="lbl-icon">🗺️</span><span class="lbl-name">원소 탐험</span><span class="lbl-desc">주기율표를 탐험하고<br>원소의 특징을 알아봐요!</span></div>
  </a>
  <a class="zone-area zone-2" id="zone2" href="https://lm99015-cyber.github.io/Molar_Mass/" onclick="spawnConfetti(event)">
    <div class="zone-glow"></div>
    <div class="zone-label"><span class="lbl-icon">🧪</span><span class="lbl-name">화학식 탐험</span><span class="lbl-desc">화학식 조합부터 몰량 계산까지!</span></div>
  </a>
  <a class="zone-area zone-3" id="zone3" href="https://notebooklm.google.com/notebook/1cd16fdd-9c71-4347-a87f-17ceac3267f7/preview" onclick="spawnConfetti(event)">
    <div class="zone-glow"></div>
    <div class="zone-label"><span class="lbl-icon">🤖</span><span class="lbl-name">AI 원소 연구소</span><span class="lbl-desc">AI와 함께 궁금한 것을 연구해요!<br>🔑 구글 계정 로그인 필요</span></div>
  </a>
  <a class="zone-area zone-4" id="zone4" href="https://lm99015-cyber.github.io/game_level/" onclick="spawnConfetti(event)">
    <div class="zone-glow"></div>
    <div class="zone-label"><span class="lbl-icon">🎮</span><span class="lbl-name">원소 게임존</span><span class="lbl-desc">게임으로 원소를 정복하라!</span></div>
  </a>
</div>

<script>
// 이미지 기준 % 좌표 (좌상단x, 좌상단y, 우하단x, 우하단y)
const ZONES = [
  { id:'zone1', x1:3.5,  y1:60.7, x2:24.3, y2:84.0 },
  { id:'zone2', x1:30.5, y1:60.2, x2:49.1, y2:82.9 },
  { id:'zone3', x1:54.7, y1:61.7, x2:70.8, y2:84.1 },
  { id:'zone4', x1:75.7, y1:61.1, x2:95.3, y2:85.5 },
];

function getImageRect() {
  const img = document.getElementById('mapImg');
  const iw = img.naturalWidth  || 1920;
  const ih = img.naturalHeight || 1080;
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const imgRatio    = iw / ih;
  const screenRatio = sw / sh;
  let rw, rh, ox, oy;
  if (imgRatio > screenRatio) {
    rw = sw; rh = sw / imgRatio;
    ox = 0;  oy = (sh - rh) / 2;
  } else {
    rh = sh; rw = sh * imgRatio;
    ox = (sw - rw) / 2; oy = 0;
  }
  return { ox, oy, rw, rh };
}

function positionZones() {
  const { ox, oy, rw, rh } = getImageRect();
  ZONES.forEach(z => {
    const el = document.getElementById(z.id);
    if (!el) return;
    const left   = ox + rw * z.x1 / 100;
    const top    = oy + rh * z.y1 / 100;
    const width  = rw * (z.x2 - z.x1) / 100;
    const height = rh * (z.y2 - z.y1) / 100;
    el.style.left   = left   + 'px';
    el.style.top    = top    + 'px';
    el.style.width  = width  + 'px';
    el.style.height = height + 'px';
  });
}

// 이미지 로드 후 + 리사이즈 시 좌표 재계산
const img = document.getElementById('mapImg');
img.addEventListener('load', positionZones);
if (img.complete) positionZones();
window.addEventListener('resize', positionZones);

// 커서 따라다니는 라벨
let activeLabel = null;
document.querySelectorAll('.zone-area').forEach(zone => {
  const label = zone.querySelector('.zone-label');
  const glow  = zone.querySelector('.zone-glow');
  zone.addEventListener('mouseenter', () => {
    activeLabel = label;
    if(label) label.style.opacity = '1';
    if(glow)  glow.style.opacity  = '1';
  });
  zone.addEventListener('mouseleave', () => {
    activeLabel = null;
    if(label) label.style.opacity = '0';
    if(glow)  glow.style.opacity  = '0';
  });
});
document.addEventListener('mousemove', e => {
  if (!activeLabel) return;
  const lw = activeLabel.offsetWidth || 220;
  const lh = activeLabel.offsetHeight || 80;
  // zone4 라벨은 항상 커서 왼쪽
  const forceLeft = activeLabel.closest('#zone4') !== null;
  let x = forceLeft ? e.clientX - lw - 20 : e.clientX + 20;
  let y = e.clientY - lh / 2;
  if (!forceLeft && x + lw > window.innerWidth  - 10) x = e.clientX - lw - 20;
  if (y < 10) y = 10;
  if (y + lh > window.innerHeight - 10) y = window.innerHeight - lh - 10;
  activeLabel.style.left = x + 'px';
  activeLabel.style.top  = y + 'px';
});

// 뒤로가기로 돌아올 때 hover 상태 초기화
window.addEventListener('pageshow', () => {
  activeLabel = null;
  document.querySelectorAll('.zone-glow').forEach(g => g.style.opacity = '0');
  document.querySelectorAll('.zone-label').forEach(l => l.style.opacity = '0');
});

// 파티클
function spawnConfetti(e) {
  const x = e.clientX, y = e.clientY;
  const cols = ["#f5c842","#22a86a","#3b82f6","#e8421a","#ffffff","#a0d060"];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const sz = 4 + Math.random()*8, ang = (Math.PI*2/18)*i, dist = 60 + Math.random()*80;
    p.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist}px;animation-duration:${0.5+Math.random()*0.4}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}
</script>
</body>
</html>
